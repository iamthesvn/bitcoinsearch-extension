<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Search</title>
    <link rel="stylesheet" href="window.css" />
  </head>
  <body>
    <div class="bs-window">
      <header class="bs-window-header">
        <div class="bs-logo">
          <svg
            class="bs-logo-icon"
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle cx="12" cy="12" r="12" fill="#f7931a" />
            <path
              d="M15.7 10.3c.2-1.4-.9-2.2-2.4-2.7l.5-1.9-1.2-.3-.4 1.8c-.3-.1-.7-.2-1.1-.2l.4-1.8-1.2-.3-.5 1.9c-.3-.1-.6-.2-.8-.3l-.1-.1-1.7-.4-.3 1.2s.9.2.9.2c.5.1.6.5.5.8l-.5 2.2v.1l-.8 3.1c-.1.2-.3.5-.7.4.1.1-.8-.2-.8-.2l-.6 1.4 1.5.4c.3.1.6.2.9.2l-.5 2 1.2.3.5-1.9c.3.1.7.2 1.1.3l-.5 1.9 1.2.3.5-2c2 .5 3.5-.2 4.1-1.6.5-1.2 0-2-.9-2.5.7-.2 1.2-.8 1.4-1.8zm-2.4 3.8c-.4 1.3-2.2.6-2.8.4l.5-2c.6.2 2.6.5 2.3 1.6zm.3-3.8c-.3 1.1-1.8.5-2.3.4l.4-1.8c.5.1 2.2.4 1.9 1.4z"
              fill="#171923"
            />
          </svg>
          <span class="bs-logo-text">bitcoin search</span>
        </div>
        <button class="bs-close" aria-label="Close window">×</button>
      </header>

      <main class="bs-window-body">
        <div class="bs-search-box">
          <input
            class="bs-input"
            type="text"
            placeholder="Search for taproot, schnorr, lightning…"
            autocomplete="off"
            autofocus
          />
          <button class="bs-search-btn" type="button" aria-label="Search">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
          </button>
        </div>
        <div class="bs-results"></div>
      </main>

      <footer class="bs-window-footer">
        <a href="https://bitcoinsearch.xyz/" target="_blank" rel="noopener noreferrer"
          >Open bitcoinsearch.xyz ↗</a
        >
        <span>Press <kbd>Esc</kbd> to close</span>
      </footer>
    </div>

    <script src="shared.js"></script>
    <script src="window.js"></script>
  </body>
</html>
